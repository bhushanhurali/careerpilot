<main class="auth-page">
  <mat-card class="auth-card">
    <mat-card-header>
      <mat-card-title>Sign in</mat-card-title>
      <mat-card-subtitle>Continue managing your job search pipeline.</mat-card-subtitle>
    </mat-card-header>

    <mat-card-content>
      <form class="auth-form" [formGroup]="form" (ngSubmit)="submit()">
        <mat-form-field appearance="outline">
          <mat-label>Email</mat-label>
          <input matInput type="email" formControlName="email" autocomplete="email" />
          @if (emailError()) {
            <mat-error>{{ emailError() }}</mat-error>
          }
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Password</mat-label>
          <input
            matInput
            [type]="hidePassword() ? 'password' : 'text'"
            formControlName="password"
            autocomplete="current-password"
          />
          <button
            mat-icon-button
            matSuffix
            type="button"
            [attr.aria-label]="hidePassword() ? 'Show password' : 'Hide password'"
            (click)="hidePassword.set(!hidePassword())"
          >
            <mat-icon>{{ hidePassword() ? 'visibility' : 'visibility_off' }}</mat-icon>
          </button>
          @if (passwordError()) {
            <mat-error>{{ passwordError() }}</mat-error>
          }
        </mat-form-field>

        @if (errorMessage()) {
          <p class="form-error">{{ errorMessage() }}</p>
        }

        <button mat-flat-button color="primary" type="submit" [disabled]="isSubmitting()">
          @if (isSubmitting()) {
            <mat-progress-spinner diameter="18" mode="indeterminate" />
          }
          <span>Sign in</span>
        </button>
      </form>
    </mat-card-content>

    <mat-card-actions align="end">
      <a mat-button routerLink="/auth/register">Create account</a>
    </mat-card-actions>
  </mat-card>
</main>
