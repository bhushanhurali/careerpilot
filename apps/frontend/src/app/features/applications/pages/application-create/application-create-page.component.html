<a mat-button routerLink="/applications">Back to applications</a>

<section class="form-page">
  <h1>New application</h1>
  <cp-application-form
    submitLabel="Create application"
    [isSaving]="applicationStore.saving()"
    [errorMessage]="applicationStore.formError()?.message ?? null"
    (saveApplication)="save($event)"
    (cancelForm)="cancel()"
  />
</section>
