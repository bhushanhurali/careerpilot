<h2 mat-dialog-title>Delete {{ data.contactName }}?</h2>

<mat-dialog-content>
  <p>This contact will be removed from normal use. This action cannot be undone here.</p>
  @if (errorMessage()) {
    <p class="dialog-error">{{ errorMessage() }}</p>
  }
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button type="button" [disabled]="isDeleting()" (click)="cancel()">Cancel</button>
  <button
    mat-flat-button
    color="warn"
    type="button"
    [disabled]="isDeleting()"
    (click)="confirmDelete()"
  >
    @if (isDeleting()) {
      <mat-progress-spinner diameter="18" mode="indeterminate" />
    }
    <span>Delete contact</span>
  </button>
</mat-dialog-actions>
