<a mat-button [routerLink]="['/companies', companyId]">Back to company</a>

<section class="form-page">
  <h1>Add contact</h1>
  <cp-contact-form
    submitLabel="Create contact"
    [isSaving]="contactStore.saving()"
    [errorMessage]="contactStore.formError()?.message ?? null"
    (saveContact)="save($event)"
    (cancelForm)="cancel()"
  />
</section>
