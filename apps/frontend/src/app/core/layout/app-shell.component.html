<mat-toolbar color="primary">
  <a class="brand-link" routerLink="/companies">CareerPilot</a>
  <nav class="primary-nav" aria-label="Primary navigation">
    <a mat-button routerLink="/companies" routerLinkActive="active-link">Companies</a>
  </nav>
  <span class="toolbar-spacer"></span>
  @switch (authStore.status()) {
    @case ('authenticated') {
      <span class="user-name">{{ authStore.displayName() }}</span>
      <button mat-icon-button type="button" aria-label="Sign out" (click)="logout()">
        <mat-icon>logout</mat-icon>
      </button>
    }
    @case ('unknown') {
      <span class="user-name">Restoring session...</span>
    }
  }
</mat-toolbar>

<main class="app-shell__content">
  <router-outlet />
</main>
