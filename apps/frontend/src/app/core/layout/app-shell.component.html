<mat-toolbar color="primary">
  <span>CareerPilot</span>
  <span class="toolbar-spacer"></span>
  @switch (authStore.status()) {
    @case ('authenticated') {
      <span class="user-name">{{ authStore.displayName() }}</span>
      <button mat-icon-button type="button" aria-label="Sign out" (click)="logout()">
        <mat-icon>logout</mat-icon>
      </button>
    }
    @case ('unknown') {
      <span class="user-name">Restoring session...</span>
    }
  }
</mat-toolbar>

<main class="app-shell__content">
  <h1>CareerPilot foundation is ready.</h1>
  <p>Your authenticated workspace is ready for the next feature phase.</p>
</main>
