services:
  postgres:
    image: postgres:17-alpine
    container_name: careerpilot-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-careerpilot}
      POSTGRES_USER: ${POSTGRES_USER:-careerpilot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-careerpilot_dev_password}
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-careerpilot} -d ${POSTGRES_DB:-careerpilot}']
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile.dev
    container_name: careerpilot-backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: development
      PORT: 3000
      DATABASE_URL: postgres://${POSTGRES_USER:-careerpilot}:${POSTGRES_PASSWORD:-careerpilot_dev_password}@postgres:5432/${POSTGRES_DB:-careerpilot}
      CORS_ORIGIN: ${BACKEND_CORS_ORIGIN:-http://localhost:4200}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    ports:
      - '${BACKEND_PORT:-3000}:3000'
    volumes:
      - ./apps/backend:/workspace/apps/backend
      - ./package.json:/workspace/package.json:ro
      - ./pnpm-workspace.yaml:/workspace/pnpm-workspace.yaml:ro
      - ./pnpm-lock.yaml:/workspace/pnpm-lock.yaml:ro
      - backend_node_modules:/workspace/apps/backend/node_modules
      - root_node_modules:/workspace/node_modules
    command: pnpm --filter @careerpilot/backend dev

  frontend:
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile.dev
    container_name: careerpilot-frontend
    environment:
      NG_APP_API_BASE_URL: ${NG_APP_API_BASE_URL:-http://localhost:3000/api/v1}
    ports:
      - '${FRONTEND_PORT:-4200}:4200'
    volumes:
      - ./apps/frontend:/workspace/apps/frontend
      - ./package.json:/workspace/package.json:ro
      - ./pnpm-workspace.yaml:/workspace/pnpm-workspace.yaml:ro
      - ./pnpm-lock.yaml:/workspace/pnpm-lock.yaml:ro
      - frontend_node_modules:/workspace/apps/frontend/node_modules
      - root_node_modules:/workspace/node_modules
    command: pnpm --filter @careerpilot/frontend dev --host 0.0.0.0

volumes:
  postgres_data:
  backend_node_modules:
  frontend_node_modules:
  root_node_modules:
